<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방명록</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&family=Gowun+Batang&display=swap');

        :root {
            --deep-navy: #020c1b;
            --ocean-mid: #071428;
            --ice-blue: #a8c8e8;
            --crystal-blue: #c8dff0;
            --pale-blue: #ddeef8;
            --glow-blue: #7fb3d3;
            --shimmer: #b0d4e8;
            --white-glow: rgba(220, 240, 255, 0.9);
            --card-bg: rgba(10, 25, 50, 0.75);
            --border-crystal: rgba(168, 200, 232, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gowun Batang', serif;
            background: var(--deep-navy);
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
            color: var(--crystal-blue);
        }

        /* ── 별하늘 캔버스 ── */
        #starCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── 물결 오버레이 ── */
        body::after {
            content: '';
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: 35%;
            background: linear-gradient(to top,
                rgba(10, 30, 60, 0.6) 0%,
                transparent 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* ── 컨테이너 ── */
        .container {
            max-width: 760px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ── 헤더 ── */
        .header {
            text-align: center;
            margin-bottom: 44px;
            padding-top: 10px;
        }

        .title {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 2.9rem;
            font-weight: 400;
            letter-spacing: 0.18em;
            color: var(--white-glow);
            text-shadow:
                0 0 12px rgba(168, 200, 232, 0.8),
                0 0 30px rgba(168, 200, 232, 0.4),
                0 0 60px rgba(100, 160, 210, 0.2);
            margin-bottom: 12px;
            animation: title-pulse 6s ease-in-out infinite;
        }

        @keyframes title-pulse {
            0%,100% { text-shadow: 0 0 12px rgba(168,200,232,0.8), 0 0 30px rgba(168,200,232,0.4), 0 0 60px rgba(100,160,210,0.2); }
            50%     { text-shadow: 0 0 20px rgba(168,200,232,1),   0 0 50px rgba(168,200,232,0.6), 0 0 90px rgba(100,160,210,0.4); }
        }

        .subtitle {
            font-size: 1.05rem;
            color: rgba(168, 200, 232, 0.65);
            letter-spacing: 0.12em;
        }

        .title-divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--glow-blue), transparent);
            margin: 18px auto;
            box-shadow: 0 0 8px rgba(127, 179, 211, 0.5);
        }

        /* ── 카드 공통 ── */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-crystal);
            border-radius: 18px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow:
                0 0 0 1px rgba(168,200,232,0.08),
                0 8px 32px rgba(0, 20, 50, 0.6),
                inset 0 1px 0 rgba(200, 230, 255, 0.1);
        }

        /* ── 폼 ── */
        .form-container {
            padding: 32px 30px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: -1px; left: 20%; right: 20%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(168,200,232,0.6), transparent);
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 9px;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: rgba(168, 200, 232, 0.75);
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            padding: 13px 16px;
            background: rgba(5, 15, 35, 0.7);
            border: 1px solid rgba(168, 200, 232, 0.2);
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Gowun Batang', serif;
            color: var(--pale-blue);
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(168, 200, 232, 0.3);
        }

        input:focus, textarea:focus {
            border-color: rgba(168, 200, 232, 0.55);
            background: rgba(8, 20, 45, 0.85);
            box-shadow:
                0 0 0 3px rgba(168,200,232,0.07),
                0 0 16px rgba(127,179,211,0.15),
                inset 0 0 20px rgba(100, 160, 210, 0.04);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.7;
        }

        .submit-btn {
            display: block;
            margin: 6px auto 0;
            padding: 13px 44px;
            background: transparent;
            border: 1px solid rgba(168, 200, 232, 0.45);
            border-radius: 50px;
            font-family: 'Nanum Myeongjo', serif;
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: var(--pale-blue);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(168,200,232,0.12), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before { left: 100%; }

        .submit-btn:hover {
            border-color: rgba(168, 200, 232, 0.8);
            color: #fff;
            box-shadow: 0 0 20px rgba(127,179,211,0.25), 0 0 40px rgba(127,179,211,0.1);
            text-shadow: 0 0 10px rgba(200,230,255,0.6);
        }

        .submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── 상태 바 ── */
        .firebase-status {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            padding: 8px 16px;
            border-radius: 8px;
            margin-bottom: 22px;
            color: rgba(168,200,232,0.6);
        }
        .firebase-connected { color: rgba(160, 220, 190, 0.7); }
        .firebase-error     { color: rgba(220, 180, 200, 0.65); }

        /* ── 로딩 ── */
        .loading {
            text-align: center;
            color: rgba(168,200,232,0.5);
            font-size: 0.95rem;
            padding: 30px;
            letter-spacing: 0.15em;
        }

        /* ── 항목 ── */
        .guestbook-entries { display: grid; gap: 16px; }

        .entry {
            padding: 22px 26px;
            position: relative;
            animation: entry-appear 0.6s ease both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        @keyframes entry-appear {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .entry:hover {
            transform: translateY(-3px);
            box-shadow:
                0 0 0 1px rgba(168,200,232,0.15),
                0 12px 40px rgba(0, 20, 50, 0.7),
                0 0 20px rgba(127,179,211,0.06),
                inset 0 1px 0 rgba(200, 230, 255, 0.12);
        }

        .entry::after {
            content: '';
            position: absolute;
            top: 0; left: 16%; right: 16%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(168,200,232,0.2), transparent);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .entry-name {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 1.15rem;
            color: var(--white-glow);
            letter-spacing: 0.08em;
            text-shadow: 0 0 10px rgba(168,200,232,0.4);
        }

        .entry-date {
            font-size: 0.78rem;
            color: rgba(168,200,232,0.4);
            letter-spacing: 0.1em;
        }

        .entry-message {
            font-size: 0.98rem;
            line-height: 1.8;
            color: rgba(200, 225, 245, 0.75);
            padding-left: 14px;
            border-left: 1px solid rgba(168,200,232,0.2);
        }

        .no-entries {
            text-align: center;
            color: rgba(168,200,232,0.4);
            font-size: 1rem;
            padding: 40px;
            letter-spacing: 0.12em;
            line-height: 2.2;
        }

        @media (max-width: 600px) {
            .title { font-size: 2.1rem; }
            .form-container { padding: 22px 18px; }
        }
    </style>
</head>
<body>

<!-- 별 캔버스 -->
<canvas id="starCanvas"></canvas>

<div class="container">
    <div class="header">
        <h1 class="title">✦ 방명록 ✦</h1>
        <div class="title-divider"></div>
        <p class="subtitle">낙원인이라면 방명록을 남겨줘~♪⊹.˚</p>
    </div>

    <div id="firebaseStatus" class="firebase-status">Firebase 연결 중…</div>

    <div class="form-container glass-card">
        <form id="guestbookForm">
            <div class="form-group">
                <label for="name">✦ 이름</label>
                <input type="text" id="name" required placeholder="이름을 알려줘!">
            </div>
            <div class="form-group">
                <label for="message">✦ 메시지</label>
                <textarea id="message" required placeholder="메시지를 남겨줘!"></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">✦ 방명록 남기기 ✦</button>
        </form>
    </div>

    <div class="guestbook-entries" id="entries">
        <div class="loading">방명록을 불러오는 중…</div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp }
        from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyD9Y_7VyzjQvfPBjixoNf8fizfxlwzQr4I",
        authDomain: "beta-b7f78.firebaseapp.com",
        projectId: "beta-b7f78",
        storageBucket: "beta-b7f78.firebasestorage.app",
        messagingSenderId: "8487351227",
        appId: "1:8487351227:web:ef99c0c1d46850b27f4a9e",
        measurementId: "G-HMCXTFE8YC"
    };

    let db, isConnected = false;

    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        isConnected = true;
        setStatus('firebase-connected', '✦ 모든 친구들이 방명록을 볼 수 있어요 ✦');
    } catch (e) {
        setStatus('firebase-error', '데모 모드 — 이 기기에서만 저장됩니다');
    }

    function setStatus(cls, msg) {
        const el = document.getElementById('firebaseStatus');
        el.className = 'firebase-status ' + cls;
        el.textContent = msg;
    }

    async function saveFirebase(name, message) {
        try {
            await addDoc(collection(db, 'guestbook'), { name, message, timestamp: serverTimestamp() });
            return true;
        } catch { return false; }
    }

    function loadFirebase() {
        const q = query(collection(db, 'guestbook'), orderBy('timestamp', 'desc'));
        onSnapshot(q, snap => {
            const entries = snap.docs.map(d => {
                const data = d.data();
                return {
                    name: data.name, message: data.message,
                    date: data.timestamp
                        ? data.timestamp.toDate().toLocaleString('ko-KR', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })
                        : '방금 전'
                };
            });
            renderEntries(entries);
        });
    }

    function saveLocal(name, message) {
        const arr = JSON.parse(localStorage.getItem('gb') || '[]');
        arr.unshift({ name, message, date: new Date().toLocaleString('ko-KR', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }) });
        localStorage.setItem('gb', JSON.stringify(arr));
    }
    function loadLocal() { renderEntries(JSON.parse(localStorage.getItem('gb') || '[]')); }

    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function renderEntries(entries) {
        const el = document.getElementById('entries');
        if (!entries.length) {
            el.innerHTML = `<div class="no-entries glass-card">아직 방명록이 비어있어요 💭<br>첫 번째 메시지를 남겨주세요 🪼</div>`;
            return;
        }
        el.innerHTML = entries.map((e, i) => `
            <div class="entry glass-card" style="animation-delay:${i * 0.08}s">
                <div class="entry-header">
                    <div class="entry-name">${esc(e.name)}</div>
                    <div class="entry-date">${e.date}</div>
                </div>
                <div class="entry-message">${esc(e.message)}</div>
            </div>`).join('');
    }

    document.getElementById('guestbookForm').addEventListener('submit', async e => {
        e.preventDefault();
        const name    = document.getElementById('name').value.trim();
        const message = document.getElementById('message').value.trim();
        const btn     = document.getElementById('submitBtn');
        if (!name || !message) return;

        btn.disabled = true;
        btn.textContent = '저장 중…';

        const ok = isConnected ? await saveFirebase(name, message) : (saveLocal(name, message), loadLocal(), true);

        document.getElementById('name').value = '';
        document.getElementById('message').value = '';
        btn.textContent = ok ? '✦ 등록되었습니다 ✦' : '✕ 저장 실패';

        setTimeout(() => {
            btn.textContent = '✦ 방명록 남기기 ✦';
            btn.disabled = false;
        }, 2200);
    });

    window.addEventListener('DOMContentLoaded', () => {
        isConnected ? loadFirebase() : loadLocal();
    });
</script>

<!-- 별/십자가 반짝임 캔버스 -->
<script>
(function() {
    const canvas = document.getElementById('starCanvas');
    const ctx    = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function randRange(a, b) { return a + Math.random() * (b - a); }

    function initStars() {
        stars = [];
        // 훨씬 많이 — 화면당 약 250~400개
        const count = Math.floor((W * H) / 2200);
        for (let i = 0; i < count; i++) {
            // 십자가 40%, 점 60%
            const type = Math.random() < 0.40 ? 'cross' : 'dot';
            stars.push({
                x:     randRange(0, W),
                y:     randRange(0, H),
                type,
                // 크기: 십자가는 2~9, 점은 0.4~2.2
                size:  randRange(type === 'cross' ? 2 : 0.4, type === 'cross' ? 9 : 2.2),
                alpha: randRange(0.15, 1.0),
                // 반짝임 속도 다양하게
                speed: randRange(0.004, 0.025),
                phase: randRange(0, Math.PI * 2),
                // 흰색 위주, 살짝 파란 틴트
                whiteness: randRange(0.6, 1.0),
            });
        }
    }

    function drawCross(x, y, size, alpha, w) {
        // w: whiteness 0~1 → 완전 흰색 ~ 옅은 하늘색 사이
        const lightness = 88 + w * 10;   // 88~98%
        const sat       = (1 - w) * 55;  // 0~55% 채도
        const color     = `hsl(210, ${sat}%, ${lightness}%)`;
        const glow      = `hsla(210, 70%, 95%, 0.9)`;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.lineWidth   = Math.max(0.8, size * 0.18);
        ctx.shadowBlur  = size * 5;
        ctx.shadowColor = glow;
        ctx.lineCap     = 'round';

        // 세로
        ctx.beginPath();
        ctx.moveTo(x, y - size);
        ctx.lineTo(x, y + size);
        ctx.stroke();
        // 가로
        ctx.beginPath();
        ctx.moveTo(x - size, y);
        ctx.lineTo(x + size, y);
        ctx.stroke();

        // 대각선 짧은 팔 (크리스탈 느낌)
        const d = size * 0.42;
        ctx.globalAlpha = alpha * 0.45;
        ctx.lineWidth   = Math.max(0.5, size * 0.10);
        ctx.shadowBlur  = size * 3;
        ctx.beginPath(); ctx.moveTo(x-d, y-d); ctx.lineTo(x+d, y+d); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+d, y-d); ctx.lineTo(x-d, y+d); ctx.stroke();

        ctx.restore();
    }

    function drawDot(x, y, size, alpha, w) {
        const lightness = 88 + w * 10;
        const sat       = (1 - w) * 50;
        ctx.save();
        ctx.globalAlpha = alpha;
        const grad = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
        grad.addColorStop(0,   `hsla(210, ${sat}%, ${lightness}%, 1)`);
        grad.addColorStop(0.35,`hsla(210, ${sat+10}%, ${lightness-5}%, 0.7)`);
        grad.addColorStop(1,   `hsla(210, 60%, 80%, 0)`);
        ctx.fillStyle  = grad;
        ctx.shadowBlur  = size * 6;
        ctx.shadowColor = `hsla(210, 80%, 96%, 0.8)`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function tick() {
        ctx.clearRect(0, 0, W, H);

        // 파란~네이비 그라데이션 배경
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0,    '#0a1628');   // 상단: 미드나이트 블루
        bg.addColorStop(0.3,  '#0d2040');   // 딥 블루
        bg.addColorStop(0.65, '#091830');   // 네이비
        bg.addColorStop(1,    '#040d1c');   // 바텀: 딥 네이비
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // 중앙 은은한 글로우 (밤바다 빛 반사)
        const glow = ctx.createRadialGradient(W*0.5, H*0.38, 0, W*0.5, H*0.38, W*0.55);
        glow.addColorStop(0,   'rgba(60, 130, 210, 0.07)');
        glow.addColorStop(0.5, 'rgba(30,  80, 160, 0.04)');
        glow.addColorStop(1,   'rgba(0,   0,   0,  0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, W, H);

        stars.forEach(s => {
            s.phase += s.speed;
            const flicker = Math.sin(s.phase) * 0.5 + 0.5;   // 0~1
            // 완전히 꺼졌다 켜지는 극적인 반짝임
            const a = Math.pow(flicker, 1.6) * s.alpha;

            if (s.type === 'cross') drawCross(s.x, s.y, s.size, a, s.whiteness);
            else                   drawDot  (s.x, s.y, s.size, a, s.whiteness);
        });

        requestAnimationFrame(tick);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    requestAnimationFrame(tick);
})();
</script>
</body>
</html>
